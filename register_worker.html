<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register Worker – HomeFixr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="logo">🔧 HomeFixr</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="search.html">Find Workers</a></li>
      <li><a href="register_worker.html" class="active">Register as Worker</a></li>
      <li><a href="book.html">Book a Service</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1>Register as a Worker</h1>
    <p>Join HomeFixr and get more clients in your city</p>
  </div>

  <div class="form-container">
    <div class="form-card">
      <div id="form-msg"></div>

      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="name" placeholder="e.g. Rajesh Kumar"/>
      </div>
      <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" id="phone" placeholder="e.g. 9876543210" maxlength="10"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="e.g. rajesh@email.com"/>
      </div>
      <div class="form-group">
        <label>Service Category *</label>
        <select id="category">
          <option value="">-- Select Category --</option>
          <option>Plumber</option>
          <option>Electrician</option>
          <option>Carpenter</option>
          <option>Painter</option>
          <option>Cleaner</option>
          <option>AC Technician</option>
        </select>
      </div>
      <div class="form-group">
        <label>City *</label>
        <input type="text" id="city" placeholder="e.g. Bengaluru"/>
      </div>
      <div class="form-group">
        <label>Years of Experience *</label>
        <input type="number" id="experience" placeholder="e.g. 5" min="0" max="50"/>
      </div>
      <div class="form-group">
        <label>Rate per Hour (₹) *</label>
        <input type="number" id="rate" placeholder="e.g. 300" min="0"/>
      </div>
      <div class="form-group">
        <label>About / Skills</label>
        <textarea id="about" rows="3" placeholder="Describe your skills and services..."></textarea>
      </div>

      <button class="btn-primary full-width" onclick="registerWorker()">Register Now 🚀</button>
    </div>
  </div>

  <footer class="footer">
    <p>© 2025 HomeFixr | Internship Project</p>
  </footer>

  <script>
    async function registerWorker() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const category = document.getElementById('category').value;
      const city = document.getElementById('city').value.trim();
      const experience = document.getElementById('experience').value;
      const rate = document.getElementById('rate').value;
      const about = document.getElementById('about').value.trim();
      const msgBox = document.getElementById('form-msg');

      if (!name || !phone || !category || !city || !experience || !rate) {
        msgBox.innerHTML = '<div class="msg error">⚠️ Please fill all required fields.</div>';
        return;
      }
      if (phone.length !== 10) {
        msgBox.innerHTML = '<div class="msg error">⚠️ Phone must be 10 digits.</div>';
        return;
      }

      try {
        const res = await fetch('/api/register_worker', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone, email, category, city, experience, rate, about })
        });
        const data = await res.json();
        if (data.success) {
          msgBox.innerHTML = '<div class="msg success">✅ Worker registered successfully! You will start receiving bookings.</div>';
          document.querySelectorAll('input, select, textarea').forEach(el => el.value = '');
        } else {
          msgBox.innerHTML = `<div class="msg error">❌ Error: ${data.message}</div>`;
        }
      } catch (err) {
        msgBox.innerHTML = '<div class="msg error">⚠️ Cannot connect to server. Make sure you ran: python app.py.</div>';
      }
    }
  </script>
</body>
</html>
